<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskPupkin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
</head>
<body>
    <header>
        <div class="navbar">
            <p class="comfortaa-title">AskPupkin</p>
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Поиск...">
                <button class="search-button">Найти</button>
            </div>
            <div class="user-info">
                <div class="image-caption-box">
                    <img src="static/img/avatar-default.png" alt="Аватар">
                    <div class="caption">Avatar</div>
                </div>
                <div class="user-section">
                    <span class="username">Mr. Kirill</span> 
                    <div class="auth-buttons">
                        <a class="btn-template" href="#">settings</a>  
                        <a class="btn-template" href="#">log in</a>
                    </div>
                    
                </div>
            </div>
            
        </div>
    </header>

    <footer style="background-color: #eeebd9; width: 100%; height: 50px;"></footer>

    
</body>
</html>
