<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskPupkin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
</head>
<body>
    <header>
        <div class="navbar">
            <p class="comfortaa-title">AskPupkin</p>
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Поиск...">
                <button class="search-button">Найти</button>
            </div>
            <div class="user-info">
                <div class="image-caption-box">
                    <img src="static/img/avatar-default.png" alt="Аватар">
                    <div class="caption">Avatar</div>
                </div>
                <div class="user-section">
                    <span class="username">Dr. Pepper</span> 
                    <div class="auth-buttons">
                        <a class="btn-template" href="#">settings</a>  
                        <a class="btn-template" href="#">log in</a>
                    </div>
                    
                </div>
            </div>
            
        </div>
    </header>

    <main>
        <div class="content">
            <div class="content-left">
                <div class="question-nav">
                    <h1>Settings: Dr. Pepper</h1>
                </div>
                <div class="your-question-structure">
                    <div class="your-text-line">
                        <div class="label">Login</div>
                        <input type="text" class="your-question-title" placeholder="dr_pepper"></input>
                    </div>
                    
                    <div class="your-text-line">
                        <div class="label">Email</div>
                        <input type="text" class="your-question-title" placeholder="dr.pepper@mail.ru"></input>
                    </div>
                    
                    <div class="your-text-line">
                        <div class="label">NickName</div>
                        <input type="text" class="your-question-title" placeholder="Dr. Pepper"></input>
                    </div>

                    <div class="your-text-line">
                        <div class="label">Upload avatar</div>
                        <div class="question-image" style="margin: 0;">
                            avatar
                        </div>                    
                    </div>

                    <div class="your-text-line">
                        <div class="label"></div>
                        <div>
                            <div class="auth-buttons">
                                <a class="btn-template" href="#">c:\avatar.jpg</a>
                                <a class="btn-template" href="#">choose</a>  
                            </div>
                        </div>
                    </div>
                    
                    <div class="your-text-line">
                        <div class="label"></div>
                        <button class="your-question-button">SAVE</button>
                    </div>
                    
                </div>
            </div>    
            <div class="content-right">
                <div>
                    <h1> Popular Tags</h1>
                    <div class="tags-cloud">
                        <a href="#" class="tag tag-medium">perl</a>
                        <a href="#" class="tag tag-huge">python</a>
                        <a href="#" class="tag tag-large">TechnoPark</a>
                        <a href="#" class="tag tag-medium">MySQL</a>
                        <a href="#" class="tag tag-medium">django</a>
                        <a href="#" class="tag tag-small">Mail.Ru</a>
                        <a href="#" class="tag tag-medium">Voloshin</a>
                        <a href="#" class="tag tag-small">Firefox</a>
                    </div>
                </div>
                <div>
                    <h1>Best Members</h1>
                    <a href="#" class="my-url list-members">Mr. Freeman</a>
                    <a href="#" class="my-url list-members">Dr. House</a>
                    <a href="#" class="my-url list-members">Bender</a>
                    <a href="#" class="my-url list-members">Queen Victoria</a>
                    <a href="#" class="my-url list-members">V. Pupkin</a>

                </div>
            </div>
        </div>
    
    </main>
    
</body>

</html>
